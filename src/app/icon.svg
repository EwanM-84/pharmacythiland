<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1b2a"/>
      <stop offset="100%" stop-color="#1a3a5c"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>

  <!-- Teal top-left accent bar -->
  <rect x="0" y="0" width="32" height="4" rx="7" fill="url(#accent)" opacity="0.9"/>
  <rect x="0" y="0" width="32" height="4" rx="0"/>
  <rect x="0" y="0" width="32" height="4" rx="7" fill="url(#accent)"/>

  <!-- R letter -->
  <text
    x="5"
    y="24"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="20"
    font-weight="700"
    fill="#ffffff"
    letter-spacing="-1">R</text>

  <!-- x letter in teal -->
  <text
    x="18"
    y="24"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="14"
    font-weight="700"
    fill="#22d3ee">x</text>

  <!-- small dot accent -->
  <circle cx="28" cy="10" r="2" fill="#0891b2" opacity="0.7"/>
</svg>
